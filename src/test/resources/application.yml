spring:
  datasource:
    url: jdbc:mysql://localhost:3309/hhplus?characterEncoding=UTF-8&serverTimezone=UTC
    username: application
    password: application
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop

    show-sql: true

  main:
    allow-bean-definition-overriding: true

  kafka:
    bootstrap-servers: 127.0.0.1:9092

    listener:
      auto-startup: false

    consumer:
      order-topic-log-group-id: test-order-group
      member-topic-log-group-id: test-member-group
      auto-offset-reset: earliest

  task:
    scheduling:
      enabled: false